<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Deep Obsidian MCP logo</title>
  <desc id="desc">A faceted obsidian crystal with an amber knowledge core and connected graph nodes.</desc>
  <defs>
    <radialGradient id="background" cx="50%" cy="46%" r="72%">
      <stop offset="0%" stop-color="#15172a"/>
      <stop offset="58%" stop-color="#0b0d18"/>
      <stop offset="100%" stop-color="#030407"/>
    </radialGradient>

    <linearGradient id="edgeViolet" x1="275" y1="110" x2="781" y2="920" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0edff"/>
      <stop offset="19%" stop-color="#aaa2ff"/>
      <stop offset="48%" stop-color="#5b63ff"/>
      <stop offset="78%" stop-color="#2e50d8"/>
      <stop offset="100%" stop-color="#09112d"/>
    </linearGradient>

    <linearGradient id="edgeBlue" x1="270" y1="740" x2="835" y2="345" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b55ff"/>
      <stop offset="47%" stop-color="#9aa3ff"/>
      <stop offset="100%" stop-color="#d9e0ff"/>
    </linearGradient>

    <linearGradient id="facetLeft" x1="260" y1="174" x2="554" y2="869" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d8d2ff"/>
      <stop offset="18%" stop-color="#5d56b9"/>
      <stop offset="45%" stop-color="#080a18"/>
      <stop offset="76%" stop-color="#111331"/>
      <stop offset="100%" stop-color="#050714"/>
    </linearGradient>

    <linearGradient id="facetRight" x1="642" y1="114" x2="808" y2="826" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1d2048"/>
      <stop offset="32%" stop-color="#050711"/>
      <stop offset="63%" stop-color="#0f1433"/>
      <stop offset="100%" stop-color="#243a8a"/>
    </linearGradient>

    <radialGradient id="amberCore" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#fff9c7"/>
      <stop offset="30%" stop-color="#ffd760"/>
      <stop offset="68%" stop-color="#ff9e2e"/>
      <stop offset="100%" stop-color="#6c2d0a"/>
    </radialGradient>

    <radialGradient id="violetNode" cx="35%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#f4f0ff"/>
      <stop offset="42%" stop-color="#8176ff"/>
      <stop offset="100%" stop-color="#231a76"/>
    </radialGradient>

    <radialGradient id="amberNode" cx="35%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#fff6bd"/>
      <stop offset="48%" stop-color="#ffb33b"/>
      <stop offset="100%" stop-color="#7a330c"/>
    </radialGradient>

    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="32" flood-color="#000000" flood-opacity="0.58"/>
    </filter>

    <filter id="violetGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0.40 0 0 0 0.18  0 0.36 0 0 0.20  0 0 0.98 0 0.95  0 0 0 0.72 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="amberGlow" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.97  0 0.58 0 0 0.34  0 0 0.10 0 0.02  0 0 0 0.88 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="178" fill="url(#background)"/>
  <circle cx="512" cy="540" r="380" fill="#14183a" opacity="0.12"/>

